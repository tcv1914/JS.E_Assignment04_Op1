<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chọn Tên Ngẫu Nhiên</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .output-box {
        border: 1px solid #ccc;
        padding: 15px;
        width: 500px;
        min-height: 30px;
      }
      #result-para {
        color: purple;
        margin: 0;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="output-box">
      <p id="result-para"></p>
    </div>

    <script>
      const names = ["Anne", "John", "David", "Emma", "Chris", "Sophia"];
      const para = document.getElementById("result-para");

      function chooseName() {
        const randomIndex = Math.floor(Math.random() * names.length);

        para.textContent = names[randomIndex];
      }

      chooseName();
    </script>
  </body>
</html>
